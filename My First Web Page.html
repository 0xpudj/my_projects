<!DOCTYPE html>
<html>
  <head>
    <title>My First Web Page</title>
    <link rel="stylesheet" href="My First Web Page.css">
  </head>
  <body>
    <h1>Welcome to My Web Page</h1>
    <p>This is my first HTML page. I am learning how to create a simple web page.</p>

    <h2>My Hobbies</h2>
    <ul>
      <li>Reading</li>
      <li>Sport</li>
      <li>Travel</li>
    </ul>

    <h2>My Image</h2>
    <img src="student.jpg" alt="Student image" width="300">

    <h2>Useful Link</h2>
    <a href="https://www.google.com" target="_blank">Open Google</a>

    <h2>Student Information</h2>
    <table border="1">
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Group</th>
      </tr>
      <tr>
        <td>Ali</td>
        <td>20</td>
        <td>Group 1</td>
      </tr>
      <tr>
        <td>Sarah</td>
        <td>21</td>
        <td>Group 2</td>
      </tr>
    </table>

    <h2>Contact Form</h2>
    <form>
      <p>
        Name:
        <input type="text" name="name">
      </p>
      <p>
        Email:
        <input type="email" name="email">
      </p>
      <p>
        Message:
        <textarea name="message"></textarea>
      </p>
      <input type="submit" value="Send">
    </form>
  </body>
</html>
